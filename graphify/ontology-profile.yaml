id: public-domain-mystery-uat
version: 1
default_language: en

node_types:
  # Track C-3.5: visual_encoding per node type drives the HTML export
  # shape, in addition to the file_type fallback. Shapes used here are
  # vis.js-native (dot | square | triangle | box | diamond | star | hexagon).
  # color_hex is intentionally omitted so the per-community palette keeps
  # signalling cluster membership while shape signals ontological nature.
  Character:
    aliases: [person, detective, suspect, adversary]
    source_backed: true
    status_policy: hardenable
    visual_encoding:
      shape: diamond
  Alias:
    aliases: [name variant, disguise]
    source_backed: true
    visual_encoding:
      shape: square
  Work:
    aliases: [book, collection]
    source_backed: true
    visual_encoding:
      shape: box
  Saga:
    aliases: [series, cycle]
    source_backed: true
    visual_encoding:
      shape: hexagon
  Author:
    aliases: [creator, writer]
    source_backed: true
    visual_encoding:
      shape: star
  Translator:
    aliases: [translator, edition translator]
    source_backed: true
    visual_encoding:
      shape: triangle
  ChapterOrStory:
    aliases: [chapter, short story]
    source_backed: true
    visual_encoding:
      shape: box
  Case:
    aliases: [mystery, investigation]
    source_backed: true
    status_policy: hardenable
    visual_encoding:
      shape: star
  Event:
    source_backed: true
    visual_encoding:
      shape: triangle
  Fact:
    aliases: [documented fact, observation, case fact]
    source_backed: true
    visual_encoding:
      shape: dot
  CrimeOrScheme:
    aliases: [crime, plot, scheme, fraud, theft]
    source_backed: true
    status_policy: hardenable
    visual_encoding:
      shape: star
  Motive:
    aliases: [reason, incentive, revenge, reputation]
    source_backed: true
    visual_encoding:
      shape: triangle
  ForensicMethod:
    aliases: [method, deduction, test, investigative technique]
    source_backed: true
    visual_encoding:
      shape: diamond
  DisguisePersona:
    aliases: [persona, assumed identity, disguise]
    source_backed: true
    visual_encoding:
      shape: square
  Location:
    source_backed: true
    visual_encoding:
      shape: hexagon
  Object:
    source_backed: true
    visual_encoding:
      shape: dot
  Evidence:
    source_backed: true
    visual_encoding:
      shape: diamond
  Organization:
    source_backed: true
    visual_encoding:
      shape: hexagon
  NarrativeRole:
    aliases: [narrator, viewpoint]
    source_backed: true
    visual_encoding:
      shape: triangle

relation_types:
  appears_in:
    source: [Character, Alias, NarrativeRole]
    target: [Work, ChapterOrStory]
    requires_evidence: true
  alias_of:
    source: Alias
    target: Character
    requires_evidence: true
  belongs_to_saga:
    source: Work
    target: Saga
    requires_evidence: true
  written_by:
    source: Work
    target: Author
    requires_evidence: true
  translated_by:
    source: Work
    target: Translator
    requires_evidence: true
  part_of:
    source: [ChapterOrStory, Case, Event, Fact, CrimeOrScheme, Motive, ForensicMethod, DisguisePersona, Location, Object, Evidence, Organization, NarrativeRole]
    target: [Work, ChapterOrStory]
    requires_evidence: true
  narrates:
    source: [Character, NarrativeRole]
    target: [Work, ChapterOrStory]
    requires_evidence: true
  investigates:
    source: Character
    target: Case
    requires_evidence: true
  assists:
    source: Character
    target: Character
    requires_evidence: true
  commits:
    source: Character
    target: [Case, Event, CrimeOrScheme]
    requires_evidence: true
  involves:
    source: [Case, Event, Fact, CrimeOrScheme]
    target: [Character, Location, Object, Evidence, Organization, DisguisePersona, CrimeOrScheme]
    requires_evidence: true
  occurs_at:
    source: [Case, Event, Fact, CrimeOrScheme]
    target: Location
    requires_evidence: true
  targets:
    source: [CrimeOrScheme, Motive]
    target: [Character, Object, Location, Organization]
    requires_evidence: true
  motivates:
    source: Motive
    target: [Character, Case, Event, CrimeOrScheme]
    requires_evidence: true
  uses_method:
    source: [Character, Case, CrimeOrScheme, Organization]
    target: [ForensicMethod, Evidence, DisguisePersona]
    requires_evidence: true
  establishes_fact:
    source: [Evidence, Object, ForensicMethod, Character]
    target: Fact
    requires_evidence: true
  disguises_as:
    source: Character
    target: DisguisePersona
    requires_evidence: true
  used_in:
    source: [DisguisePersona, ForensicMethod]
    target: [Case, Event, CrimeOrScheme]
    requires_evidence: true
  suspected_of:
    source: Character
    target: Case
    requires_evidence: true
  located_in:
    source: [Case, Event, Organization]
    target: Location
    requires_evidence: true
  contains_evidence:
    source: Case
    target: [Evidence, Object]
    requires_evidence: true
  mentions:
    source: [Work, ChapterOrStory, Case]
    target: [Character, Alias, Location, Object, Evidence]
    requires_evidence: true
  opposes:
    source: Character
    target: Character
    requires_evidence: true
  same_as:
    source: [Character, Work, Location]
    target: [Character, Work, Location]
    requires_evidence: true

citation_policy:
  minimum_granularity: section
  require_source_file: true
  allow_bbox: when_available

hardening:
  statuses: [candidate, needs_review, validated, rejected, deprecated]
  default_status: candidate
  promotion_requires:
    - source_citation
    - allowed_relation_type
  status_transitions:
    - from: candidate
      to: needs_review
    - from: candidate
      to: validated
      requires: [source_citation]
    - from: candidate
      to: rejected
    - from: needs_review
      to: validated
      requires: [source_citation]
    - from: needs_review
      to: rejected
    - from: validated
      to: deprecated

inference_policy:
  allow_inferred_relations: true
  allowed_relation_types: [appears_in, mentions, same_as]
  require_evidence_refs: true

evidence_policy:
  require_evidence_refs: true
  min_refs: 1
  relation_types:
    - appears_in
    - alias_of
    - narrates
    - investigates
    - assists
    - commits
    - involves
    - occurs_at
    - targets
    - motivates
    - uses_method
    - establishes_fact
    - disguises_as
    - used_in
    - suspected_of
    - located_in
    - contains_evidence
    - mentions
    - opposes
    - same_as

outputs:
  ontology:
    enabled: true
    canonical_node_types:
      - Character
      - Work
      - Saga
      - Author
      - Translator
      - ChapterOrStory
      - Case
      - Event
      - Fact
      - CrimeOrScheme
      - Motive
      - ForensicMethod
      - DisguisePersona
      - Location
      - Object
      - Evidence
      - Organization
      - NarrativeRole
    relation_exports:
      - appears_in
      - alias_of
      - belongs_to_saga
      - written_by
      - translated_by
      - part_of
      - narrates
      - investigates
      - assists
      - commits
      - involves
      - occurs_at
      - targets
      - motivates
      - uses_method
      - establishes_fact
      - disguises_as
      - used_in
      - suspected_of
      - located_in
      - contains_evidence
      - mentions
      - opposes
      - same_as
    wiki:
      enabled: true
      page_node_types: [Character, Work, Saga, Author, ChapterOrStory, Case, Fact, CrimeOrScheme, Motive, ForensicMethod, DisguisePersona, Location]
