version: 1

# Project-owned Graphify configuration for the curated mystery ontology UAT.
# Profile mode is strictly opt-in: this file activates configured-profile
# behavior. The committed `.graphify/` studio bundle is republished as a
# portable UAT artifact; profile HTML/wiki writes stay disabled here so the
# studio bundle is updated explicitly and QA-gated by the target below.

profile:
  path: graphify/ontology-profile.yaml

inputs:
  # Curated UAT scope. Each path is a leaf directory containing text.txt
  # + metadata.json.
  corpus:
    - corpus/sherlock-holmes/a-study-in-scarlet
    - corpus/sherlock-holmes/the-adventures-of-sherlock-holmes
    - corpus/sherlock-holmes/the-hound-of-the-baskervilles
    - corpus/arsene-lupin/the-extraordinary-adventures-of-arsene-lupin-gentleman-burglar
    - corpus/father-brown/the-innocence-of-father-brown
    - corpus/dr-thorndyke/the-red-thumb-mark
    - corpus/raffles/the-amateur-cracksman
    - corpus/sherlock-holmes/the-sign-of-the-four
    - corpus/sherlock-holmes/the-memoirs-of-sherlock-holmes
    - corpus/sherlock-holmes/the-return-of-sherlock-holmes
    - corpus/sherlock-holmes/the-valley-of-fear
    - corpus/sherlock-holmes/his-last-bow
    - corpus/sherlock-holmes/the-case-book-of-sherlock-holmes
    - corpus/arsene-lupin/arsene-lupin
    - corpus/arsene-lupin/the-blonde-lady
    - corpus/arsene-lupin/the-hollow-needle
    - corpus/arsene-lupin/the-crystal-stopper
    - corpus/father-brown/the-wisdom-of-father-brown
    - corpus/father-brown/the-secret-of-father-brown
    - corpus/dr-thorndyke/john-thorndyke-s-cases
    - corpus/dr-thorndyke/the-vanishing-man
    - corpus/dr-thorndyke/the-adventures-of-dr-thorndyke
    - corpus/raffles/raffles-further-adventures-of-the-amateur-cracksman
    - corpus/raffles/a-thief-in-the-night
    - corpus/raffles/mr-justice-raffles
  scope: all

dataprep:
  citation_minimum: section
  preserve_source_structure: true

outputs:
  state_dir: .graphify
  write_html: false
  write_wiki: false
  write_profile_report: true
  ontology:
    enabled: true
    reconciliation:
      decisions_path: graphify/reconciliation/decisions.jsonl
      audit_log_path: .graphify/ontology/reconciliation/applied-patches.jsonl

quality:
  targets:
    mystery_public_studio:
      kind: studio-static-bundle
      bundle_path: .graphify/studio
      publication:
        blocking: true
        require_resolved_manifest: true
        deny_source_path_patterns:
          - ".graphify/scratch/**"
        data_allowlist:
          - graph.json
          - scene.json
          - entities.json
          - reconciliation-candidates.json
          - workspace-manifest.json
          - ontology/citations.json
      citations:
        extraction:
          mode: all_extracted
          require_producer_proof: true
          contract_id: graphify_all_extracted_entity_citations_v1
          allowed_contract_hashes:
            - sha256:c4f4f4dd1d972896681723daa9388dc8e1bb33fbdc5b8a8f6ede96362d83e916
          require_batch_coverage: true
        display: full
        inline:
          mode: top_k
          top_k: 8
        require_sidecar: true
        min_count_by_node:
          character_sherlock_holmes: 89
        no_shrink_by_node:
          character_sherlock_holmes:
            baseline_field: citation_count
            max_drop: 0
      graph:
        min_nodes: 1983
        min_edges: 3693
        max_missing_descriptions: 0
        max_orphan_nodes: 0
        forbidden_node_id_patterns:
          - "^src_"
          - "^scripts_"
          - "^tests_"
        forbidden_source_path_patterns:
          - "src/**"
          - "scripts/**"
          - "tests/**"
        allowed_node_types:
          - Character
          - Alias
          - Work
          - Saga
          - Author
          - Translator
          - ChapterOrStory
          - Case
          - Event
          - Fact
          - CrimeOrScheme
          - Motive
          - ForensicMethod
          - DisguisePersona
          - Location
          - Object
          - Evidence
          - Organization
          - NarrativeRole
        min_degree_by_type:
          ChapterOrStory: 2
        max_degree_by_type_and_derivation:
          ChapterOrStory:
            citation_section_story_context: 30
            source_location_story_context: 60
        required_neighbor_ids_by_node:
          chapter_adventures_speckled_band:
            - character_helen_stoner
            - character_dr_grimesby_roylott
            - object_speckled_band
            - place_stoke_moran
          story_veiled_lodger:
            - character_eugenia_ronder
            - character_leonardo
            - character_ronder_showman
            - crime_ronder_murder
            - object_sahara_king
            - place_abbas_parva
        forbidden_edges:
          - source: object_speckled_band
            target: chapter_adventures_beryl_coronet
            relation: appears_in
      scene:
        forbidden_shape_by_type:
          Alias:
            - box
            - roundedbox
          Work:
            - box
            - roundedbox
          Saga:
            - box
            - roundedbox
          Author:
            - box
            - roundedbox
          Translator:
            - box
            - roundedbox
          ChapterOrStory:
            - box
            - roundedbox
          Case:
            - box
            - roundedbox
          Event:
            - box
            - roundedbox
          Fact:
            - box
            - roundedbox
          CrimeOrScheme:
            - box
            - roundedbox
          Motive:
            - box
            - roundedbox
          ForensicMethod:
            - box
            - roundedbox
          DisguisePersona:
            - box
            - roundedbox
          Location:
            - box
            - roundedbox
          Object:
            - box
            - roundedbox
          Evidence:
            - box
            - roundedbox
          Organization:
            - box
            - roundedbox
          NarrativeRole:
            - box
            - roundedbox
      reconciliation:
        min_candidates: 31
        require_groupable_by_type: true
      communities:
        require_semantic_labels: true
